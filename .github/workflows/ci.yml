name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.15.0'

jobs:
  # ---------------------------------------------------------------------
  # Instalação e lint/typecheck compartilhados (rápido)
  # -------------------------------------------------------------------
  changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      admin-web: ${{ steps.filter.outputs.admin-web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Paths filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/api/**'
              - 'packages/**'
              - 'pnpm-workspace.yaml'
              - 'package.json'
            admin-web:
              - 'apps/admin-web/**'
              - 'packages/**'
              - 'pnpm-workspace.yaml'
              - 'package.json'
            mobile:
              - 'apps/mobile-client/**'
              - 'apps/mobile-driver/**'
            docker:
              - 'services/api/Dockerfile'
              - 'apps/admin-web/Dockerfile'
              - 'docker-compose.yml'
              - '.github/workflows/**'

  # -------------------------------------------------------------------
  # Backend API
  # -------------------------------------------------------------------
  api:
    name: API (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' || github.ref_name == 'main' }}
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile=false

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Unit tests
        run: pnpm test -- --ci --coverage
        continue-on-error: true

      - name: Build
        run: pnpm build

  # -------------------------------------------------------------------
  # Admin Web
  # -------------------------------------------------------------------
  admin-web:
    name: Admin Web (lint, typecheck, build)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.admin-web == 'true' || github.ref_name == 'main' }}
    defaults:
      run:
        working-directory: apps/admin-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile=false

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Type check
        run: pnpm type-check

      - name: Build
        run: pnpm build
        env:
          API_URL: http://localhost:3000/api/v1

  # -------------------------------------------------------------------
  # Mobile apps (Flutter)
  # -------------------------------------------------------------------
  mobile:
    name: Mobile (analyze)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.mobile == 'true' || github.ref_name == 'main' }}
    strategy:
      fail-fast: false
      matrix:
        app: [mobile-client, mobile-driver]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: flutter pub get

      - name: Analyze
        working-directory: apps/${{ matrix.app }}
        run: flutter analyze
        continue-on-error: true

  # -------------------------------------------------------------------
  # Validação dos Dockerfiles
  # -------------------------------------------------------------------
  docker:
    name: Validate Dockerfiles
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.docker == 'true' || github.ref_name == 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate API Dockerfile
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/api/Dockerfile
          push: false
          target: builder
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Admin Web Dockerfile
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/admin-web/Dockerfile
          push: false
          target: builder
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            API_URL=http://localhost:3000/api/v1

