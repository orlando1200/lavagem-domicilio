name: Deploy Preview to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/preview/**'
      - '.github/workflows/gh-pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy preview site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare preview bundle
        run: |
          mkdir -p _site
          cp -r apps/preview/* _site/
          # Unzip any preview archives so the HTML can be served directly
          for f in _site/*.zip; do
            [ -e "$f" ] || continue
            dir="_site/$(basename "$f" .zip)"
            mkdir -p "$dir"
            unzip -q "$f" -d "$dir"
          done

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: false
